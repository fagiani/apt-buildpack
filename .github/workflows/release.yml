name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  register:
    name: Package, Publish, and Register
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Package Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: setup-tools
        name: Install yj
        run: |
          curl -sSL https://github.com/sclevine/yj/releases/latest/download/yj-linux-amd64 -o /usr/local/bin/yj
          chmod +x /usr/local/bin/yj

      - name: Setup crane
        uses: imjasonh/setup-crane@v0.4

      - id: setup-pack
        uses: buildpacks/github-actions/setup-pack@v5.7.4

      - id: package
        run: |
          #!/usr/bin/env bash
          set -euo pipefail
          BP_ID="$(yj -t < buildpack.toml | jq -r .buildpack.id)"
          VERSION="$(yj -t < buildpack.toml | jq -r .buildpack.version)"
          PACKAGE="${REPO}/$(echo "$BP_ID" | sed 's/\//_/g')"
          pack buildpack package --publish "${PACKAGE}:${VERSION}"
          DIGEST="$(crane digest "${PACKAGE}:${VERSION}")"
          echo "bp_id=$BP_ID" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "address=${PACKAGE}@${DIGEST}" >> "$GITHUB_OUTPUT"
        shell: bash
        env:
          REPO: ghcr.io/${{ github.repository_owner }}/buildpacks

      - id: register
        uses: docker://ghcr.io/buildpacks/actions/registry/request-add-entry:5.7.4
        with:
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          id: ${{ steps.package.outputs.bp_id }}
          version: ${{ steps.package.outputs.version }}
          address: ${{ steps.package.outputs.address }}
